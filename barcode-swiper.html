<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Barcode Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf417/1.0.0/pdf417.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #e8ff47;
    --accent2: #47d4ff;
    --text: #f0f0f0;
    --muted: #666680;
    --border: #2a2a3a;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    touch-action: pan-y;
  }

  /* ── ENTRY SCREEN ── */
  #entry-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    background: var(--bg);
    z-index: 100;
    transition: opacity 0.4s, transform 0.4s;
  }

  #entry-screen.hidden {
    opacity: 0;
    transform: translateY(-30px);
    pointer-events: none;
  }

  .logo {
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.3em;
    color: var(--accent);
    margin-bottom: 2.5rem;
    text-transform: uppercase;
  }

  h1 {
    font-size: clamp(2rem, 8vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 0.5rem;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 3rem;
    font-family: 'Space Mono', monospace;
  }

  .input-wrap {
    width: 100%;
    max-width: 380px;
    position: relative;
    margin-bottom: 1rem;
  }

  .input-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 0.5rem;
    display: block;
  }

  #code-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    font-size: 1.1rem;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    letter-spacing: 0.1em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  #code-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,255,71,0.12);
  }

  #code-input.error {
    border-color: #ff4747;
    box-shadow: 0 0 0 3px rgba(255,71,71,0.12);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }

  .char-count {
    position: absolute; right: 1rem; top: 50%; transform: translateY(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    pointer-events: none;
    margin-top: 10px;
  }

  .char-count.ready { color: var(--accent); }

  .paste-btn {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    width: 100%;
    max-width: 380px;
    padding: 0.55rem 1rem;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    -webkit-appearance: none;
    margin-bottom: 0.25rem;
  }
  .paste-btn:active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.06);
  }
  .paste-btn svg { flex-shrink: 0; }
  .paste-btn.success {
    border-color: var(--accent);
    color: var(--accent);
  }
  .paste-btn.fail {
    border-color: #ff6b6b;
    color: #ff6b6b;
  }

  #error-msg {
    font-size: 0.75rem;
    color: #ff6b6b;
    font-family: 'Space Mono', monospace;
    min-height: 1.2em;
    margin-bottom: 1.5rem;
    text-align: center;
    width: 100%;
    max-width: 380px;
  }

  .generate-btn {
    width: 100%;
    max-width: 380px;
    padding: 1rem;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-appearance: none;
  }

  .generate-btn:active { transform: scale(0.97); opacity: 0.9; }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .divider {
    width: 100%;
    max-width: 380px;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin: 0.25rem 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .divider span {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .custom-row {
    width: 100%;
    max-width: 380px;
    display: flex;
    gap: 0.75rem;
    align-items: flex-end;
  }
  .custom-row .input-wrap { flex: 1; margin-bottom: 0; }

  #suffix-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    font-size: 1.1rem;
    font-family: 'Space Mono', monospace;
    color: var(--text);
    letter-spacing: 0.2em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
    text-align: center;
  }
  #suffix-input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(71,212,255,0.12);
  }
  #suffix-input::placeholder { color: var(--muted); }

  .custom-btn {
    flex-shrink: 0;
    padding: 1rem 1.1rem;
    background: var(--card);
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
    white-space: nowrap;
    -webkit-appearance: none;
  }
  .custom-btn:active { transform: scale(0.96); background: rgba(71,212,255,0.1); }
  .custom-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Custom barcode screen */
  #custom-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(20px);
  }
  #custom-screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
  }
  .custom-top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .custom-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }
  .custom-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    padding: 1.25rem 1.25rem 1.5rem;
    gap: 1rem;
  }

  /* ── SWIPER SCREEN ── */
  #swiper-screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  #swiper-screen.active {
    opacity: 1;
    pointer-events: all;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .back-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.4rem 0.75rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .back-btn:active { border-color: var(--accent); }

  .counter {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent);
    font-weight: 700;
  }

  .counter span { color: var(--muted); }

  /* Dot indicators */
  .dots-wrap {
    display: flex;
    justify-content: center;
    gap: 4px;
    padding: 0.6rem 1rem;
    flex-wrap: wrap;
    background: var(--bg);
    flex-shrink: 0;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
  }

  .dot.active {
    background: var(--accent);
    transform: scale(1.4);
  }

  /* Cards viewport */
  .viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .cards-track {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }

  .cards-track.no-transition { transition: none; }

  .card {
    min-width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 1.25rem 1.25rem 1.5rem;
    gap: 1rem;
  }

  .barcode-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .barcode-box {
    background: #fff;
    border-radius: 16px;
    padding: 0.75rem 1rem;
    width: 100%;
    max-width: 340px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .barcode-box canvas {
    width: 100% !important;
    height: auto !important;
    display: block;
    image-rendering: pixelated;
  }

  .code-display {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    color: var(--text);
    width: 100%;
    max-width: 340px;
    text-align: center;
  }

  .code-display .base { color: var(--muted); }
  .code-display .suffix { color: var(--accent); font-weight: 700; }

  .badge {
    background: var(--accent);
    color: #0a0a0f;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    border-radius: 50%;
    width: 2.5rem; height: 2.5rem;
    display: flex; align-items: center; justify-content: center;
    position: absolute;
    top: 1rem; right: 1rem;
    box-shadow: 0 4px 12px rgba(232,255,71,0.3);
  }

  /* Bottom hint */
  .swipe-hint {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    padding: 0.5rem;
    flex-shrink: 0;
    background: var(--bg);
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="entry-screen">
  <div class="logo">PDF417 Generator</div>
  <h1>Enter your<br><span>24-digit</span> code</h1>
  <p class="subtitle">generates 25 barcodes ending 001→025</p>

  <div class="input-wrap">
    <label class="input-label" for="code-input">Base Code</label>
    <input
      id="code-input"
      type="tel"
      maxlength="24"
      placeholder="000000000000000000000000"
      autocomplete="off"
      inputmode="numeric"
    >
    <span class="char-count" id="char-count">0/24</span>
  </div>
  <button class="paste-btn" id="paste-btn" type="button">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
    <span id="paste-label">Paste from clipboard</span>
  </button>
  <div id="error-msg"></div>
  <button class="generate-btn" id="gen-btn" disabled>Generate Barcodes</button>

  <div class="divider"><span>or single custom code</span></div>

  <div class="custom-row">
    <div class="input-wrap">

      <input
        id="suffix-input"

</div>

<!-- CUSTOM SINGLE BARCODE SCREEN -->
<div id="custom-screen">

    <div class="code-display" id="custom-code-display"></div>
  </div>
</div>

<div id="swiper-screen">
  <div class="top-bar">
    <button class="back-btn" id="back-btn">← Back</button>
    <div class="counter"><span id="current-num">1</span> <span>/ 25</span></div>
  </div>

  <div class="dots-wrap" id="dots"></div>

  <div class="viewport" id="viewport">
    <div class="cards-track" id="cards-track"></div>
  </div>

  <div class="swipe-hint">← swipe to navigate →</div>
</div>

// ── PDF417 renderer (pure JS, no external lib needed) ──
// We'll use a canvas-based renderer built in

const PDF417 = (() => {
  // Compact PDF417 encoding via a minimal implementation
  // Based on the ISO 15438 standard symbol set

  const CODEWORD_TABLE = {
    START: 0x1FEA8,
    STOP: 0x3FA29,
  };

  // We'll use a simpler approach: encode via the bwip-js style canvas draw
  // Actually let's implement a real PDF417 renderer

  const ROWS_MAX = 90;
  const COLS_MIN = 1;
  const COLS_MAX = 30;

  // Symbol character table (subset - TEXT compaction)
  // Full PDF417 implementation

  function encode(data, cols = 5, securityLevel = 2) {
    // Text compaction
    const bytes = [];
    for (let i = 0; i < data.length; i++) {
      bytes.push(data.charCodeAt(i));
    }

    // Build codewords using byte compaction
    const dataCodewords = encodeBytes(bytes);

    // Error correction
    const ecCount = Math.pow(2, securityLevel + 1);
    const ecCW = errorCorrection(dataCodewords, securityLevel);

    const totalCW = dataCodewords.length + ecCW.length;
    const rows = Math.ceil(totalCW / cols);
    const paddedRows = Math.max(rows, ROWS_MIN);

    // Pad data codewords
    while (dataCodewords.length < paddedRows * cols - ecCW.length) {
      dataCodewords.push(900); // PAD
    }

    const allCW = [...dataCodewords, ...ecCW];

    // Arrange into rows
    const grid = [];
    for (let r = 0; r < paddedRows; r++) {
      grid.push(allCW.slice(r * cols, (r + 1) * cols));
    }

    return { grid, rows: paddedRows, cols, securityLevel };
  }

  function encodeBytes(bytes) {
    // Length descriptor + byte compaction
    const codewords = [];
    const n = bytes.length;

    // First codeword: length
    // Use byte compaction mode (901 for odd, 924 for multiple of 6)
    codewords.push(n + 1); // length including this

    // Switch to byte mode
    if (n % 6 === 0) {
      codewords.push(924);
      // Encode in groups of 6
      for (let i = 0; i < n; i += 6) {
        let t = 0n;
        for (let j = 0; j < 6; j++) {
          t = t * 256n + BigInt(bytes[i + j] || 0);
        }
        const group = [];
        for (let j = 0; j < 5; j++) {
          group.unshift(Number(t % 900n));
          t /= 900n;
        }
        codewords.push(...group);
      }
    } else {
      codewords.push(901);
      for (let b of bytes) codewords.push(b);
    }

    return codewords;
  }

  function errorCorrection(data, level) {
    const k = Math.pow(2, level + 1);
    // Generate coefficients
    const coeffs = generateECCoeffs(k);
    const ec = new Array(k).fill(0);
    for (let i = 0; i < data.length; i++) {

const swiperScreen = document.getElementById('swiper-screen');
const codeInput = document.getElementById('code-input');
const charCount = document.getElementById('char-count');
const errorMsg = document.getElementById('error-msg');
const genBtn = document.getElementById('gen-btn');
const backBtn = document.getElementById('back-btn');
const cardsTrack = document.getElementById('cards-track');
const dotsWrap = document.getElementById('dots');
const currentNum = document.getElementById('current-num');
const suffixInput = document.getElementById('suffix-input');
const customBtn = document.getElementById('custom-btn');
const customScreen = document.getElementById('custom-screen');
const customBackBtn = document.getElementById('custom-back-btn');

// ── Input handling ──
codeInput.addEventListener('input', () => {
  const val = codeInput.value.replace(/\D/g, '').slice(0, 24);
  codeInput.value = val;
  const len = val.length;
  charCount.textContent = `${len}/24`;
  charCount.className = 'char-count' + (len === 24 ? ' ready' : '');
  genBtn.disabled = len !== 24;
  codeInput.classList.remove('error');
  errorMsg.textContent = '';
});

genBtn.addEventListener('click', () => {
  const val = codeInput.value;
  if (val.length !== 24) {
    codeInput.classList.add('error');
    errorMsg.textContent = 'Please enter exactly 24 digits.';
    return;
  }
  buildSwiper(val);
});

// ── Paste button ──
const pasteBtn = document.getElementById('paste-btn');
const pasteLabel = document.getElementById('paste-label');

pasteBtn.addEventListener('click', async () => {
  try {
    const text = await navigator.clipboard.readText();
    const digits = text.replace(/\D/g, '').slice(0, 24);
    if (digits.length === 0) {
      flashPaste('fail', 'Nothing to paste');
      return;
    }
    codeInput.value = digits;
    codeInput.dispatchEvent(new Event('input'));
    if (digits.length === 24) {
      flashPaste('success', '✓ Pasted 24 digits');
    } else {
      flashPaste('fail', `Only ${digits.length} digits found`);
    }
  } catch (err) {
    // Fallback: focus input so user can long-press paste manually
    codeInput.focus();
    flashPaste('fail', 'Tap input to paste manually');
  }
});

function flashPaste(state, msg) {
  pasteLabel.textContent = msg;
  pasteBtn.classList.add(state);
  setTimeout(() => {
    pasteBtn.classList.remove(state);
    pasteLabel.textContent = 'Paste from clipboard';
  }, 2000);
}

backBtn.addEventListener('click', () => {
  entryScreen.classList.remove('hidden');
  swiperScreen.classList.remove('active');
});

// ── Custom suffix input handling ──
suffixInput.addEventListener('input', () => {
  const val = suffixInput.value.replace(/\D/g, '').slice(0, 3);
  suffixInput.value = val;
  // Enable if base code is valid AND suffix has 1-3 digits
  customBtn.disabled = codeInput.value.length !== 24 || val.length === 0;
});

codeInput.addEventListener('input', () => {
  // Also update custom button state when base code changes
  customBtn.disabled = codeInput.value.length !== 24 || suffixInput.value.length === 0;
}, true); // capture phase so it runs after the existing listener

customBtn.addEventListener('click', async () => {
  const base = codeInput.value;
  const suffix = suffixInput.value.padStart(3, '0');
  if (base.length !== 24) return;
  const fullCode = base + suffix;

  entryScreen.classList.add('hidden');
  customScreen.classList.add('active');

  document.getElementById('custom-label').textContent = 'Custom Ending: ' + suffix;
  document.getElementById('custom-code-display').innerHTML =
    `<span class="base">${base}</span><span class="suffix">${suffix}</span>`;

  await loadBwipJs();
  renderBarcode(document.getElementById('custom-canvas'), fullCode);
});

customBackBtn.addEventListener('click', () => {
  customScreen.classList.remove('active');
  entryScreen.classList.remove('hidden');
});

// ── Build swiper ──
async function buildSwiper(baseCode) {
  cardsTrack.innerHTML = '';
  dotsWrap.innerHTML = '';

  // Show swiper
  entryScreen.classList.add('hidden');
  swiperScreen.classList.add('active');
  currentIndex = 0;

  // Build dots
  for (let i = 0; i < 25; i++) {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  }

  // Build cards
  for (let i = 1; i <= 25; i++) {
    const suffix = String(i).padStart(3, '0');
    const fullCode = baseCode + suffix;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="barcode-label">Barcode ${i} of 25</div>
      <div class="barcode-box">
        <canvas id="bc-${i}" style="width:100%;height:auto;display:block"></canvas>
      </div>
      <div class="code-display">
        <span class="base">${baseCode}</span><span class="suffix">${suffix}</span>
      </div>
    `;
    cardsTrack.appendChild(card);
  }

  updateTrack(false);
  currentNum.textContent = '1';

  // Load bwip-js and render barcodes
  await loadBwipJs();
  for (let i = 1; i <= 25; i++) {
    const suffix = String(i).padStart(3, '0');
    const fullCode = baseCode + suffix;
    renderBarcode(document.getElementById(`bc-${i}`), fullCode);
  }
}

function loadBwipJs() {
  return new Promise((resolve) => {
    if (window.bwipjs) { resolve(); return; }
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/bwip-js/4.5.1/bwip-js-min.js';
    script.onload = resolve;
    document.head.appendChild(script);
  });
}

function renderBarcode(canvas, code) {
  try {
    bwipjs.toCanvas(canvas, {
      bcid: 'pdf417',
      text: code,
      scale: 2,
      height: 8,
      includetext: false,
      eclevel: 2,
    });
  } catch(e) {
    console.warn('Barcode render error:', e);
  }
}

// ── Swipe logic ──
function updateTrack(animate = true) {
  if (!animate) cardsTrack.classList.add('no-transition');
  else cardsTrack.classList.remove('no-transition');

  const offset = currentIndex * -100;
  cardsTrack.style.transform = `translateX(${offset}%)`;

  // Update dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === currentIndex);
  });
  currentNum.textContent = currentIndex + 1;
}

function goTo(idx) {
  currentIndex = Math.max(0, Math.min(24, idx));
  updateTrack(true);
}

const viewport = document.getElementById('viewport');

viewport.addEventListener('touchstart', (e) => {
  startX = e.touches[0].clientX;
  isDragging = true;
  dragOffset = 0;
  cardsTrack.classList.add('no-transition');
}, { passive: true });

viewport.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  dragOffset = e.touches[0].clientX - startX;
  const baseOffset = currentIndex * -100;
  const dragPct = (dragOffset / viewport.offsetWidth) * 100;
  cardsTrack.style.transform = `translateX(calc(${baseOffset}% + ${dragOffset}px))`;
}, { passive: true });

viewport.addEventListener('touchend', (e) => {
  if (!isDragging) return;
  isDragging = false;
  cardsTrack.classList.remove('no-transition');

  const threshold = viewport.offsetWidth * 0.2;
  if (dragOffset < -threshold && currentIndex < 24) {
    currentIndex++;
  } else if (dragOffset > threshold && currentIndex > 0) {
    currentIndex--;
  }

  updateTrack(true);
});

// Mouse drag (desktop)
viewport.addEventListener('mousedown', (e) => {
  startX = e.clientX;
  isDragging = true;
  cardsTrack.classList.add('no-transition');
  e.preventDefault();
});

viewport.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  dragOffset = e.clientX - startX;
  const baseOffset = currentIndex * -100;
  cardsTrack.style.transform = `translateX(calc(${baseOffset}% + ${dragOffset}px))`;
});

viewport.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  const threshold = viewport.offsetWidth * 0.15;
  if (dragOffset < -threshold && currentIndex < 24) currentIndex++;
  else if (dragOffset > threshold && currentIndex > 0) currentIndex--;
  updateTrack(true);
});

// Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (!swiperScreen.classList.contains('active')) return;
  if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
});
</script>
</body>
</html>
